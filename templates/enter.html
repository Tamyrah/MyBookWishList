<!DOCTYPE html>
<html>
<body style="text-align:center;">

<h2>Welcome to Leaflist 🌿</h2>

<input id="userInput" placeholder="Enter name">
<button onclick="go()">Enter</button>

<script>
function go() {
    let u = document.getElementById("userInput").value;
    localStorage.setItem("leaflist_user", u);
    window.location.href = "/?user=" + u;
}

window.onload = function() {
    let saved = localStorage.getItem("leaflist_user");
    if (saved) {
        window.location.href = "/?user=" + saved;
    }
}
</script>

</body>
</html>
