<!DOCTYPE html>
<html>
<head>
    <title>Leaflist Login</title>
</head>
<body style="text-align:center; padding-top:100px; background:#0b1c2c; color:white;">

    <h1>🌿 Leaflist</h1>
    <p>Enter your email to access your private reading space</p>

    <form method="POST">
        <input 
            type="email" 
            name="email" 
            placeholder="Enter your email" 
            required
            style="padding:10px; border-radius:6px; border:none;"
        >
        <br><br>
        <button style="padding:10px 15px; border-radius:6px; border:none;">
            Send Magic Link
        </button>
    </form>

</body>
</html>
