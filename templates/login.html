<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leaflist Login</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        h1 {
            margin-bottom: 5px;
        }

        p {
            margin-bottom: 20px;
            color: #cbd5f5;
        }

        input {
            padding: 12px;
            width: 260px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
        }

        button {
            margin-top: 15px;
            padding: 12px;
            width: 270px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }

        button:disabled {
            background: #4b5563;
            cursor: not-allowed;
        }

        .note {
            margin-top: 30px;
            font-size: 12px;
            color: #9ca3af;
            text-align: center;
            max-width: 280px;
        }

        .footer {
            position: fixed;
            bottom: 10px;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>

<body>

    <h1>🌿 Leaflist</h1>
    <p>Enter your email to access your private reading space</p>

    <input id="email" type="email" placeholder="Enter your email">

    <button onclick="sendMagicLink(this)">Send Magic Link</button>

    <div class="note">
        Your email is only used for secure login.<br>
        We do not store or share your personal data.
    </div>

    <div class="footer">
        © 2026 Greenleigh Lane. All rights reserved.
    </div>

    <script>
        async function sendMagicLink(button) {
            const email = document.getElementById("email").value;

            if (!email) {
                alert("Enter your email");
                return;
            }

            button.innerText = "Sending...";
            button.disabled = true;

            try {
                const res = await fetch("/send_magic_link", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                if (data.error) {
                    alert("Error: " + data.error);
                } else {
                    alert("Magic link sent! Check your email.");
                }

            } catch (err) {
                alert("Something went wrong. Try again.");
                console.error(err);
            }

            button.innerText = "Send Magic Link";
            button.disabled = false;
        }
    </script>

</body>
</html>
