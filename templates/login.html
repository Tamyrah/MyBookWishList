<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leaflist Login</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        input {
            padding: 12px;
            width: 260px;
            border-radius: 6px;
            border: none;
        }

        button {
            margin-top: 15px;
            padding: 12px;
            width: 270px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:disabled {
            background: #4b5563;
        }

        .message {
            margin-top: 15px;
        }

        .note {
            margin-top: 30px;
            font-size: 12px;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>

<body>

<h1>🌿 Leaflist</h1>
<p>Enter your email to access your private reading space</p>

<input type="email" id="email" placeholder="Enter your email">
<button id="btn">Send Magic Link</button>

<div id="message" class="message"></div>

<div class="note">
    Your email is only used for secure login.<br>
    We do not store or share your personal data.
</div>

<script>
let sending = false;

document.getElementById("btn").onclick = async () => {
    if (sending) return;

    const email = document.getElementById("email").value;
    const message = document.getElementById("message");
    const btn = document.getElementById("btn");

    if (!email) {
        message.innerText = "Enter your email.";
        return;
    }

    sending = true;
    btn.disabled = true;
    btn.innerText = "Sending...";

    const res = await fetch("/send_magic_link", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (data.success) {
        message.innerText = "Check your email for the magic link.";
    } else {
        message.innerText = data.error || "Error occurred.";
    }

    setTimeout(() => {
        sending = false;
        btn.disabled = false;
        btn.innerText = "Send Magic Link";
    }, 60000);
};
</script>

</body>
</html>
