<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leaflist Login</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        input {
            padding: 10px;
            width: 250px;
            margin-top: 15px;
            border-radius: 5px;
            border: none;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 270px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .note {
            margin-top: 30px;
            font-size: 12px;
            color: #ccc;
            text-align: center;
        }

        .error {
            margin-top: 15px;
            color: #f87171;
        }
    </style>
</head>
<body>

    <h1>🌿 Leaflist</h1>
    <p>Enter your email to access your private reading space</p>

    <input type="email" id="email" placeholder="Enter your email" />
    <button onclick="sendMagicLink()">Send Magic Link</button>

    <div id="message" class="error"></div>

    <div class="note">
        Your email is only used for secure login.<br>
        We do not store or share your personal data.
    </div>

    <script>
        async function sendMagicLink() {
            const email = document.getElementById("email").value;
            const message = document.getElementById("message");

            message.innerText = "";

            try {
                const res = await fetch("/send_magic_link", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                if (data.success) {
                    message.style.color = "#22c55e";
                    message.innerText = "Magic link sent! Check your email.";
                } else {
                    message.innerText = data.error || "Something went wrong.";
                }

            } catch (err) {
                message.innerText = "Server error. Try again.";
            }
        }
    </script>

</body>
</html>
