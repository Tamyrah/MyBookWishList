<!DOCTYPE html>

<html>
<head>
    <title>Leaflist</title>
    <style>
        body {
            background-color: #0d1b2a;
            color: white;
            text-align: center;
            font-family: Arial;
        }
        input, select {
            padding: 6px;
            margin: 5px;
        }
        button {
            padding: 6px 10px;
            margin: 3px;
            background-color: gold;
            border: none;
        }
        .filters button {
            background-color: #2c2c2c;
            color: white;
        }
        .book {
            margin: 20px;
            padding: 10px;
            border-bottom: 1px solid gray;
        }
    </style>
</head>

<body>

<h1>🌿 Leaflist</h1>
<p>Your personal reading queue</p>

<!-- SEARCH -->

<form method="GET" action="/">
    <input type="hidden" name="user" value="{{ user }}">
    <input type="text" name="query" placeholder="Search books">
    <button type="submit">Search</button>
</form>

<!-- FILTER BUTTONS -->

<div class="filters">
    <a href="/?user={{ user }}"><button>All</button></a>
    <a href="/?user={{ user }}&status=Want to Read"><button>Want to Read</button></a>
    <a href="/?user={{ user }}&status=Reading"><button>Reading</button></a>
    <a href="/?user={{ user }}&status=Finished"><button>Finished</button></a>
</div>

<!-- ADD BOOK -->

<form method="POST" action="/?user={{ user }}">
    <input type="text" name="title" placeholder="Title" required>
    <input type="text" name="author" placeholder="Author">
    <input type="text" name="genre" placeholder="Genre">

```
<select name="priority">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
</select>

<select name="status">
    <option>Want to Read</option>
    <option>Reading</option>
    <option>Finished</option>
</select>

<button type="submit">Add Book</button>
```

</form>

<h2>Your Books</h2>

{% for book in books %}

<div class="book">

```
<h3>{{ book.title }}</h3>
<p>{{ book.author }}</p>
<p>{{ book.genre }}</p>
<p>Priority: {{ book.priority }}</p>

<p>
    Status:
    <span style="
        color:
        {% if book.status == 'Want to Read' %}#4da6ff
        {% elif book.status == 'Reading' %}#4CAF50
        {% else %}#ffcc00
        {% endif %}
    ">
        {{ book.status }}
    </span>
</p>

<!-- UPDATE -->
<form method="POST" action="/update" style="display:inline;">
    <input type="hidden" name="id" value="{{ book.id }}">
    <input type="hidden" name="user" value="{{ user }}">

    <input type="text" name="title" value="{{ book.title }}">
    <input type="text" name="author" value="{{ book.author }}">
    <input type="text" name="genre" value="{{ book.genre }}">

    <select name="priority">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
    </select>

    <select name="status">
        <option>Want to Read</option>
        <option>Reading</option>
        <option>Finished</option>
    </select>

    <button type="submit">Update</button>
</form>

<!-- DELETE -->
<form method="POST" action="/delete" style="display:inline;">
    <input type="hidden" name="id" value="{{ book.id }}">
    <input type="hidden" name="user" value="{{ user }}">
    <button type="submit">Remove</button>
</form>
```

</div>
{% endfor %}

<p>© 2026 Greenleigh Lane, All rights reserved.</p>

</body>
</html>
