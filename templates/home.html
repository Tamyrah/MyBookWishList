* { box-sizing: border-box; margin: 0; padding: 0; }

body {

    color: white;
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;

h1 {
    font-size: 2.5rem;

    text-shadow: 0 0 20px rgba(250,204,21,0.4);

h1 span { color: #facc15; }

}

.glass-top {

    margin: 12px auto;

    max-width: 700px;
    border-radius: 14px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
}

    color: white;
    font-size: 0.9rem;
    outline: none;
    transition: border 0.2s;
}
