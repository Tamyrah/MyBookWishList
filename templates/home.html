<!DOCTYPE html>
<html>
<head>
    <title>Leaflist</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 70%;
            margin: auto;
        }

        .book-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            margin: 20px auto;
            border-radius: 15px;
        }

        img {
            width: 120px;
            border-radius: 10px;
            margin-top: 10px;
        }

        input, select, button {
            padding: 8px;
            margin: 5px;
            border-radius: 6px;
            border: none;
        }

        button {
            background-color: #22c55e;
            color: white;
            cursor: pointer;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
            display: block;
            margin-top: 10px;
        }

        h1 {
            margin-top: 30px;
        }

        .hello {
            font-size: 20px;
            margin-bottom: 10px;
            color: #a5f3fc;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🌿 Leaflist</h1>
    <p>Your personal reading queue</p>

    <!-- ✅ STEP 3: Hello Name -->
    {% if user %}
        <div class="hello">Hello, {{ user }} 👋🏾</div>
    {% endif %}

    <!-- ✅ SEARCH BAR (with autofocus) -->
    <form method="GET" action="/home">
        <input type="hidden" name="user" value="{{ user }}">
        <input type="text" name="query" placeholder="Search books..." autofocus>
        <button type="submit">Search</button>
    </form>

    <h2>Search Results</h2>

    {% for r in results %}
    <div class="book-card">

        <h3>{{ r.title }}</h3>
        <p>{{ r.authors }}</p>

        {% if r.thumbnail %}
            <img src="{{ r.thumbnail }}">
        {% else %}
            <p>No Cover Available</p>
        {% endif %}

        <p>{{ r.description[:200] }}...</p>

        <a href="{{ r.link }}" target="_blank">View Book</a>

        <!-- ADD FROM SEARCH -->
        <form action="/add?user={{ user }}" method="POST">
            <input type="hidden" name="title" value="{{ r.title }}">
            <input type="hidden" name="author" value="{{ r.authors }}">

            <select name="genre">
                <option>Fiction</option>
                <option>Non-Fiction</option>
                <option>Self Help</option>
                <option>Young Adult</option>
            </select>

            <select name="priority">
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
            </select>

            <select name="status">
                <option>Want to Read</option>
                <option>Reading</option>
                <option>Finished</option>
            </select>

            <button type="submit">Add Book</button>
        </form>

    </div>
    {% endfor %}

</div>

</body>
</html>
