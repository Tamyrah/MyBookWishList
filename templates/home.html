<!DOCTYPE html>
<html>
<head>
    <title>Leaflist</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div style="text-align:center; margin-top:40px;">
    <h1>🌿 Leaflist</h1>
    <p>Your personal reading queue</p>

    <!-- 🔍 SEARCH -->
    <form action="/search" method="GET">
        <input type="text" name="q" placeholder="Search books..." value="{{ query }}">
        <button type="submit">Search</button>
    </form>
</div>

<hr>

<!-- 🔍 SEARCH RESULTS -->
{% if search_results %}
<h2 style="text-align:center;">Search Results</h2>

{% for book in search_results %}
<div class="book-entry">
    <h3>{{ book.title }}</h3>
    <p><strong>Author:</strong> {{ book.author }}</p>
    <p><strong>Genre:</strong> {{ book.genre }}</p>

    <form action="/add_from_search" method="POST">
        <input type="hidden" name="title" value="{{ book.title }}">
        <input type="hidden" name="author" value="{{ book.author }}">
        <input type="hidden" name="genre" value="{{ book.genre }}">

        <input type="number" name="priority" placeholder="Priority (1-5)" min="1" max="5">

        <select name="status">
            <option>Want to Read</option>
            <option>Reading</option>
            <option>Finished</option>
        </select>

        <button type="submit">Add to List</button>
    </form>
</div>
{% endfor %}
{% endif %}

<hr>

<!-- ➕ ADD BOOK MANUALLY -->
<form method="POST" action="/" style="text-align:center;">
    <input name="title" placeholder="Title" required>
    <input name="author" placeholder="Author">
    <input name="genre" placeholder="Genre">
    <input name="priority" placeholder="Priority (1-5)">

    <select name="status">
        <option>Want to Read</option>
        <option>Reading</option>
        <option>Finished</option>
    </select>

    <button type="submit">Add Book</button>
</form>

<hr>

<!-- 📚 YOUR LIST -->
{% for book in wishlist %}
<div class="book-entry">

    <!-- ✏️ EDIT FORM -->
    <form action="/edit" method="POST">
        <input type="hidden" name="original_title" value="{{ book[1] }}">

        <input name="title" value="{{ book[1] }}">
        <input name="author" value="{{ book[2] }}">
        <input name="genre" value="{{ book[3] }}">
        <input name="priority" value="{{ book[4] }}">

        <select name="status">
            <option {% if book[5]=='Want to Read' %}selected{% endif %}>Want to Read</option>
            <option {% if book[5]=='Reading' %}selected{% endif %}>Reading</option>
            <option {% if book[5]=='Finished' %}selected{% endif %}>Finished</option>
        </select>

        <button type="submit">Update</button>
    </form>

    <!-- ❌ REMOVE -->
    <form action="/remove" method="POST">
        <input type="hidden" name="title" value="{{ book[1] }}">
        <button>Remove</button>
    </form>

</div>
{% endfor %}

</body>
</html>
