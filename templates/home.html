<!DOCTYPE html>
<html>
<head>
<title>Leaflist</title>

<style>

body {
    background: linear-gradient(135deg, #0f172a, #1e1b4b, #020617);
    color: white;
    font-family: Arial;
    text-align: center;
}

.container {
    width: 85%;
    margin: auto;
}

/* GLASS CARDS */
.glass {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    margin: 20px auto;
    width: 90%;
}

/* INPUTS */
input, select {
    padding: 8px;
    margin: 5px;
    border-radius: 6px;
    border: none;
}

/* BUTTONS */
button {
    padding: 8px 12px;
    margin: 5px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

/* BUTTON COLORS */
.add { background: #facc15; color: black; }
.update { background: #60a5fa; color: black; }
.delete { background: #ef4444; color: white; }

/* FILTER LINKS (FIXED VISIBILITY) */
.filters a {
    color: white;
    margin: 0 8px;
    text-decoration: none;
    font-weight: bold;
}

/* STATUS COLORS */
.want { color: #60a5fa; font-weight: bold; }
.reading { color: #facc15; font-weight: bold; }
.finished { color: #34d399; font-weight: bold; }

</style>
</head>

<body>

<h1>🌿 Leaflist</h1>
<p>Your personal reading queue</p>

<div class="container">

<!-- SEARCH -->
<form method="GET" action="/">
    <input type="hidden" name="user" value="{{ user }}">
    <input name="query" placeholder="Search books">
    <button type="submit">Search</button>
</form>

<!-- FILTERS -->
<div class="filters">
    <a href="/?user={{user}}">All</a>
    <a href="/?user={{user}}&status=Want to Read">Want to Read</a>
    <a href="/?user={{user}}&status=Reading">Reading</a>
    <a href="/?user={{user}}&status=Finished">Finished</a>
</div>

<!-- ADD BOOK -->
<form method="POST" action="/?user={{user}}">
    <input name="title" placeholder="Title" required>
    <input name="author" placeholder="Author">
    <input name="genre" placeholder="Genre">

    <select name="priority">
        <option>1</option>
        <option>2</option>
        <option>3</option>
    </select>

    <select name="status">
        <option>Want to Read</option>
        <option>Reading</option>
        <option>Finished</option>
    </select>

    <button type="submit" class="add">Add Book</button>
</form>

<h2>Your Books</h2>

{% for book in books %}
<div class="glass">

<h3>{{ book.title }}</h3>
<p>{{ book.author }} | {{ book.genre }}</p>
<p>Priority: {{ book.priority }}</p>

<p class="
{% if book.status == 'Want to Read' %}want
{% elif book.status == 'Reading' %}reading
{% else %}finished{% endif %}
">
Status: {{ book.status }}
</p>

<!-- UPDATE -->
<form method="POST" action="/update">
    <input type="hidden" name="id" value="{{ book.id }}">
    <input type="hidden" name="user" value="{{ user }}">

    <input name="title" value="{{ book.title }}">
    <input name="author" value="{{ book.author }}">
    <input name="genre" value="{{ book.genre }}">

    <select name="priority">
        <option {% if book.priority == 1 %}selected{% endif %}>1</option>
        <option {% if book.priority == 2 %}selected{% endif %}>2</option>
        <option {% if book.priority == 3 %}selected{% endif %}>3</option>
    </select>

    <select name="status">
        <option {% if book.status == "Want to Read" %}selected{% endif %}>Want to Read</option>
        <option {% if book.status == "Reading" %}selected{% endif %}>Reading</option>
        <option {% if book.status == "Finished" %}selected{% endif %}>Finished</option>
    </select>

    <button type="submit" class="update">Update</button>
</form>

<!-- DELETE -->
<form method="POST" action="/delete">
    <input type="hidden" name="id" value="{{ book.id }}">
    <input type="hidden" name="user" value="{{ user }}">
    <button type="submit" class="delete">Remove</button>
</form>

</div>
{% endfor %}

</div>

</body>
</html>
