<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflist | Your Personal Reading Queue</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div style="text-align: center; margin-bottom: 20px;">
    <h1 style="font-size: 2.5rem; margin-bottom: 5px;">
        🌿 Leaflist
    </h1>
    <p style="color: #bbb; font-size: 0.95rem;">
        Your personal reading queue
    </p>
</div>

<div style="text-align:center; margin-bottom:15px;">
    <a href="/?filter=All">All</a>
    <a href="/?filter=Want to Read">Want to Read</a>
    <a href="/?filter=Reading">Reading</a>
    <a href="/?filter=Finished">Finished</a>
</div>

<form method="POST" action="{{ url_for('home') }}">
    <input type="text" name="title" placeholder="Title" required>
    <input type="text" name="author" placeholder="Author">
    <input type="text" name="genre" placeholder="Genre">
    <input type="number" name="priority" placeholder="Priority (1-5)" min="1" max="5">

```
<select name="status">
    <option value="Want to Read">Want to Read</option>
    <option value="Reading">Reading</option>
    <option value="Finished">Finished</option>
</select>

<button type="submit">Add Book</button>
```

</form>

<hr>

{% for book in wishlist %}

<div class="book-entry">

```
<h3>{{ book.title }}</h3>
<p><strong>Author:</strong> {{ book.author }}</p>
<p><strong>Genre:</strong> {{ book.genre }}</p>
<p><strong>Priority:</strong> {{ book.priority }}</p>
<p><strong>Status:</strong> {{ book.status }}</p>

<form action="{{ url_for('remove_book') }}" method="POST">
    <input type="hidden" name="title" value="{{ book.title }}">
    <button type="submit">Remove</button>
</form>

<form method="POST" action="{{ url_for('edit_book') }}">
    <input type="hidden" name="original_title" value="{{ book.title }}">

    <input type="text" name="title" value="{{ book.title }}">
    <input type="text" name="author" value="{{ book.author }}">
    <input type="text" name="genre" value="{{ book.genre }}">
    <input type="number" name="priority" value="{{ book.priority }}" min="1" max="5">

    <select name="status">
        <option value="Want to Read" {% if book.status == "Want to Read" %}selected{% endif %}>Want to Read</option>
        <option value="Reading" {% if book.status == "Reading" %}selected{% endif %}>Reading</option>
        <option value="Finished" {% if book.status == "Finished" %}selected{% endif %}>Finished</option>
    </select>

    <button type="submit">Update</button>
</form>
```

</div>
<hr>
{% endfor %}

<div style="text-align:center; margin-top:20px; color:#888;">
    © Greenleigh Lane
</div>

</body>
</html>
