<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leaflist</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }
    </style>
</head>

<body>

    <h1>🌿 Welcome to Leaflist</h1>
    <p id="status">Logging you in...</p>

    <script>
        function getHashParams() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            return Object.fromEntries(params.entries());
        }

        async function handleLogin() {
            const params = getHashParams();

            if (!params.access_token) {
                document.getElementById("status").innerText = "No login token found.";
                return;
            }

            // Send token to backend
            const res = await fetch("/set_session", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    access_token: params.access_token,
                    refresh_token: params.refresh_token
                })
            });

            if (res.ok) {
                document.getElementById("status").innerText = "Login successful! Loading your app...";
                
                // 👉 THIS is where your real app will load later
                setTimeout(() => {
                    document.getElementById("status").innerText = "You are now inside Leaflist 🎉";
                }, 1000);

            } else {
                document.getElementById("status").innerText = "Login failed.";
            }
        }

        handleLogin();
    </script>

</body>
</html>
