<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leaflist</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #0f172a, #1e293b);
    color: white;
    text-align: center;
}

.container {
    padding: 40px;
}

input, select {
    padding: 10px;
    margin: 5px;
    border-radius: 6px;
    border: none;
}

input:focus {
    outline: none;
}

button {
    padding: 10px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}

.search-btn {
    background: #e5e7eb;
}

.add-btn {
    background: #22c55e;
    color: white;
}

.filters button {
    margin: 5px;
    background: #334155;
    color: white;
}

.book {
    margin-top: 20px;
    padding: 10px;
    border-top: 1px solid #555;
}

.footer {
    margin-top: 40px;
    font-size: 12px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

<h1>🌿 Leaflist</h1>
<p>Your personal reading queue</p>

<!-- 🔍 SEARCH (FIXED + CURSOR ENABLED) -->
<form action="/search" method="GET">
    <input type="text" name="query" placeholder="Search books..." autofocus>
    <button type="submit" class="search-btn">Search</button>
</form>

<h2>Search Results</h2>

{% if results %}
    {% for r in results %}
        <div class="book">
            <h3>{{ r.title }}</h3>
            <p>{{ r.author }}</p>

            {% if r.thumbnail %}
                <img src="{{ r.thumbnail }}" width="100"><br>
            {% endif %}

            {% if r.link %}
                <a href="{{ r.link }}" target="_blank">View Book</a>
            {% endif %}

            <!-- ➕ ADD FROM SEARCH -->
            <form action="/add_book" method="POST">
                <input type="hidden" name="title" value="{{ r.title }}">
                <input type="hidden" name="author" value="{{ r.author }}">

                <select name="genre">
                    <option>Fiction</option>
                    <option>Non-Fiction</option>
                    <option>Romance</option>
                    <option>Fantasy</option>
                    <option>Science Fiction</option>
                    <option>Mystery</option>
                    <option>Young Adult</option>
                </select>

                <select name="priority">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                </select>

                <select name="status">
                    <option>Want to Read</option>
                    <option>Reading</option>
                    <option>Finished</option>
                </select>

                <button type="submit" class="add-btn">Add Book</button>
            </form>
        </div>
    {% endfor %}
{% endif %}

<hr>

<!-- ➕ MANUAL ENTRY -->
<h2>Add Book Manually</h2>

<form action="/add_book" method="POST">
    <input type="text" name="title" placeholder="Title">
    <input type="text" name="author" placeholder="Author">

    <select name="genre">
        <option>Fiction</option>
        <option>Non-Fiction</option>
        <option>Romance</option>
        <option>Fantasy</option>
        <option>Science Fiction</option>
        <option>Mystery</option>
        <option>Young Adult</option>
    </select>

    <select name="priority">
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
    </select>

    <select name="status">
        <option>Want to Read</option>
        <option>Reading</option>
        <option>Finished</option>
    </select>

    <button type="submit" class="add-btn">Add Book</button>
</form>

<div class="footer">
    © 2026 Greenleigh Lane. All rights reserved.
</div>

</div>

</body>
</html>
