<!DOCTYPE html>
<html>
<head>
    <title>My Book Wishlist</title>

    <style>
        body {
            background: #1f1f1f;
            color: white;
            font-family: Arial;
        }

        input, select, button {
            padding: 8px;
            margin: 5px;
        }

        button {
            background: #f4b400;
            border: none;
            cursor: pointer;
        }

        .book-entry {
            border-top: 1px solid gray;
            padding: 15px;
        }

        .status.want { color: #bbbbbb; font-weight: bold; }
        .status.reading { color: #ffcc00; font-weight: bold; }
        .status.finished { color: #4caf50; font-weight: bold; }

        .filter-btn {
            margin: 5px;
            padding: 6px 10px;
            background: #ddd;
            color: black;
            border-radius: 5px;
            text-decoration: none;
        }

        .active-filter {
            background: #f4b400;
        }

        .edit-box {
            background: #2c2c2c;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>📚 My Book Wishlist</h1>

<!-- FILTER -->
<a href="/?filter=All" class="filter-btn {% if current_filter == 'All' %}active-filter{% endif %}">All</a>
<a href="/?filter=Want to Read" class="filter-btn {% if current_filter == 'Want to Read' %}active-filter{% endif %}">Want to Read</a>
<a href="/?filter=Reading" class="filter-btn {% if current_filter == 'Reading' %}active-filter{% endif %}">Reading</a>
<a href="/?filter=Finished" class="filter-btn {% if current_filter == 'Finished' %}active-filter{% endif %}">Finished</a>

<!-- ADD FORM -->
<form method="POST">
    <input type="text" name="title" placeholder="Title" required>
    <input type="text" name="author" placeholder="Author">
    <input type="text" name="genre" placeholder="Genre">
    <input type="number" name="priority" placeholder="Priority (1-5)">
    
    <select name="status">
        <option>Want to Read</option>
        <option>Reading</option>
        <option>Finished</option>
    </select>

    <button type="submit" name="add_book">Add Book</button>
</form>

<!-- BOOK LIST -->
{% for book in wishlist %}
<div class="book-entry">

    <h3>{{ book.title }}</h3>
    <p><strong>Author:</strong> {{ book.author }}</p>
    <p><strong>Genre:</strong> {{ book.genre }}</p>
    <p><strong>Priority:</strong> {{ book.priority }}</p>

    <p>
        <strong>Status:</strong>
        <span class="
        {% if book.status == 'Want to Read' %}status want
        {% elif book.status == 'Reading' %}status reading
        {% elif book.status == 'Finished' %}status finished
        {% endif %}
        ">
        {{ book.status }}
        </span>
    </p>

    <!-- REMOVE -->
    <form method="POST">
        <input type="hidden" name="title" value="{{ book.title }}">
        <button name="remove_book">Remove</button>
    </form>

    <!-- EDIT FORM 🔥 -->
    <div class="edit-box">
        <form method="POST">
            <input type="hidden" name="original_title" value="{{ book.title }}">

            <input type="text" name="title" value="{{ book.title }}">
            <input type="text" name="author" value="{{ book.author }}">
            <input type="text" name="genre" value="{{ book.genre }}">
            <input type="number" name="priority" value="{{ book.priority }}">

            <select name="status">
                <option {% if book.status == 'Want to Read' %}selected{% endif %}>Want to Read</option>
                <option {% if book.status == 'Reading' %}selected{% endif %}>Reading</option>
                <option {% if book.status == 'Finished' %}selected{% endif %}>Finished</option>
            </select>

            <button name="edit_book">Update</button>
        </form>
    </div>

</div>
{% endfor %}

<p style="margin-top:40px;">© Greenleigh Lane</p>

</body>
</html>
