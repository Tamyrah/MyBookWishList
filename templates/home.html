<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book Wishlist</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>📚 My Book Wishlist</h1>

<!-- FILTER BUTTONS -->
<div>
    <a href="/?filter=All">All</a>
    <a href="/?filter=Want to Read">Want to Read</a>
    <a href="/?filter=Reading">Reading</a>
    <a href="/?filter=Finished">Finished</a>
</div>

<br>

<!-- ADD BOOK FORM -->
<form method="POST">
    <input type="hidden" name="add_book" value="1">

    <input type="text" name="title" placeholder="Title" required>
    <input type="text" name="author" placeholder="Author">
    <input type="text" name="genre" placeholder="Genre">
    <input type="number" name="priority" placeholder="Priority (1-5)" min="1" max="5">

    <select name="status">
        <option value="Want to Read">Want to Read</option>
        <option value="Reading">Reading</option>
        <option value="Finished">Finished</option>
    </select>

    <button type="submit">Add Book</button>
</form>

<hr>

<!-- BOOK LIST -->
{% for book in wishlist %}
<div>
    <h3>{{ book.title }}</h3>
    <p><strong>Author:</strong> {{ book.author }}</p>
    <p><strong>Genre:</strong> {{ book.genre }}</p>
    <p><strong>Priority:</strong> {{ book.priority }}</p>

    <!-- STATUS DISPLAY -->
    <p><strong>Status:</strong> {{ book.status }}</p>

    <!-- REMOVE BUTTON -->
    <form method="POST">
        <input type="hidden" name="remove_book" value="1">
        <input type="hidden" name="title" value="{{ book.title }}">
        <button type="submit">Remove</button>
    </form>

    <hr>
</div>
{% endfor %}

<!-- FOOTER -->
<p>© Greenleigh Lane</p>

</body>
</html>
