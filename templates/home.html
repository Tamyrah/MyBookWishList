<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book Wishlist</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>📚 My Book Wishlist</h1>

<form method="POST">
    <input type="text" name="title" placeholder="Title" required>
    <input type="text" name="author" placeholder="Author">
    <input type="text" name="genre" placeholder="Genre">
    <input type="number" name="priority" placeholder="Priority (1-5)" min="1" max="5">

    <select name="status">
        <option value="Want to Read">Want to Read</option>
        <option value="Reading">Reading</option>
        <option value="Finished">Finished</option>
    </select>

    <button type="submit">Add Book</button>
</form>

<hr>

{% for book in wishlist %}
<div class="book-entry">
    <h3>{{ book.title }}</h3>
    <p><strong>Author:</strong> {{ book.author }}</p>
    <p><strong>Genre:</strong> {{ book.genre }}</p>
    <p><strong>Priority:</strong> {{ book.priority }}</p>

    <p>
        <strong>Status:</strong> 
        <span class="
            {% if book.status == 'Want to Read' %}status-want
            {% elif book.status == 'Reading' %}status-reading
            {% elif book.status == 'Finished' %}status-finished
            {% endif %}
        ">
            {{ book.status }}
        </span>
    </p>

    <a href="{{ url_for('remove', index=loop.index0) }}">
        <button type="button">Remove</button>
    </a>
</div>

<hr>
{% endfor %}

<footer style="margin-top: 40px; text-align: center; font-size: 14px;">
    © Greenleigh Lane
</footer>

</body>
</html>
