<!DOCTYPE html>
<html>
<head>
    <title>Leaflist</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            margin: 20px;
        }

        input {
            padding: 10px;
            width: 300px;
        }

        button {
            padding: 10px;
            margin-left: 5px;
        }

        .book {
            margin-top: 20px;
            padding: 10px;
            background: #1e293b;
            border-radius: 5px;
        }

        img {
            max-width: 100px;
        }
    </style>
</head>

<body>

<h1>🌿 Leaflist</h1>

<form action="/search" method="get">
    <input type="text" name="query" placeholder="Search books...">
    <button type="submit">Search</button>
</form>

{% if results %}
    {% for r in results %}
        <div class="book">
            <h3>{{ r.title }}</h3>
            <p>{{ r.author }}</p>

            {% if r.thumbnail %}
                <img src="{{ r.thumbnail }}">
            {% endif %}

            <p>{{ r.description }}</p>

            {% if r.link %}
                <a href="{{ r.link }}" target="_blank">View Book</a>
            {% endif %}
        </div>
    {% endfor %}
{% else %}
    <p>No results yet. Try searching for a book.</p>
{% endif %}

</body>
</html>
