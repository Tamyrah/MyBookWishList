<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leaflist</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            color: #22c55e;
        }

        .subtitle {
            margin-bottom: 20px;
            color: #94a3b8;
        }

        input, select {
            padding: 8px;
            margin: 5px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 8px 12px;
            background-color: #facc15;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .filters button {
            background-color: #1e293b;
            color: white;
            margin: 5px;
        }

        .book {
            border-bottom: 1px solid #334155;
            padding: 15px;
        }

        .status {
            font-weight: bold;
        }

        .want { color: #facc15; }
        .reading { color: #38bdf8; }
        .finished { color: #22c55e; }

    </style>
</head>
<body>

    <h1>🌿 Leaflist</h1>
    <div class="subtitle">Your personal reading queue</div>

    <!-- SEARCH -->
    <form action="/search" method="GET">
        <input type="text" name="q" placeholder="Search books">
        <button type="submit">Search</button>
    </form>

    <hr>

    <!-- ADD BOOK -->
    <form action="/add" method="POST">
        <input type="text" name="title" placeholder="Title" required>
        <input type="text" name="author" placeholder="Author">
        <input type="text" name="genre" placeholder="Genre">

        <select name="priority">
            <option value="1">1 (Low)</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
            <option value="5">5 (High)</option>
        </select>

        <select name="status">
            <option value="Want to Read">Want to Read</option>
            <option value="Reading">Reading</option>
            <option value="Finished">Finished</option>
        </select>

        <button type="submit">Add Book</button>
    </form>

    <!-- FILTER BUTTONS -->
    <div class="filters">
        <button onclick="window.location.href='/'">All</button>
        <button onclick="window.location.href='/?filter=Want to Read'">Want to Read</button>
        <button onclick="window.location.href='/?filter=Reading'">Reading</button>
        <button onclick="window.location.href='/?filter=Finished'">Finished</button>
    </div>

    <hr>

    <h2>Your Books</h2>

{% for book in books %}
<div class="book">

    <h3>{{ book.title }}</h3>
    <p>{{ book.author }}</p>
    <p>{{ book.genre }}</p>

    <p>Priority: {{ book.priority }}</p>
    <p>Status: {{ book.status }}</p>

    <form action="/update/{{ book.id }}" method="POST">
        <select name="priority">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>

        <select name="status">
            <option value="Want to Read">Want to Read</option>
            <option value="Reading">Reading</option>
            <option value="Finished">Finished</option>
        </select>

        <button type="submit">Update</button>
    </form>

    <form action="/delete/{{ book.id }}" method="POST">
        <button type="submit">Remove</button>
    </form>

</div>
{% endfor %}

            <select name="priority">

        <!-- DELETE -->

    {% endfor %}

</body>
</html>
