<!DOCTYPE html>
<html>
<head>
    <title>Leaflist</title>
</head>

<body>

<h1>Leaflist 🌿</h1>

<input id="searchBox" placeholder="Search books" autofocus>
<button onclick="searchBooks()">Search</button>

<div id="results"></div>

<h3>Filters</h3>
<button onclick="filterBooks('all')">All</button>
<button onclick="filterBooks('Want to Read')">Want to Read</button>
<button onclick="filterBooks('Reading')">Reading</button>
<button onclick="filterBooks('Finished')">Finished</button>

<h3>Add Book</h3>
<input id="title" placeholder="Title">
<input id="author" placeholder="Author">
<input id="genre" placeholder="Genre">
<input id="priority" type="number" value="1">
<select id="status">
    <option>Want to Read</option>
    <option>Reading</option>
    <option>Finished</option>
</select>
<button onclick="addBook()">Add</button>

<h2>Your Books</h2>
<div id="books"></div>

<!-- ✅ COPYRIGHT (RIGHT PLACE) -->
<p style="margin-top:40px; text-align:center;">
    © 2026 Greenleigh Lane. All rights reserved.
</p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>

const supabase = supabase.createClient("YOUR_SUPABASE_URL", "YOUR_SUPABASE_KEY");

async function apiFetch(url, options = {}) {
    const { data } = await supabase.auth.getSession();

    return fetch(url, {
        ...options,
        headers: {
            ...(options.headers || {}),
            Authorization: `Bearer ${data.session.access_token}`
        }
    });
}

let allBooks = [];

async function loadBooks() {
    const res = await apiFetch('/books');
    const data = await res.json();
    allBooks = data;
    renderBooks(data);
}

function renderBooks(data) {
    const container = document.getElementById("books");
    container.innerHTML = "";

    data.forEach(b => {
        container.innerHTML += `
        <div>
            <b>${b.title}</b> - ${b.author}<br>
            ${b.genre} | Priority: ${b.priority}<br>
            Status: ${b.status}<br>

            <button onclick="removeBook('${b.id}')">Remove</button>

            <br><br>
        </div><hr>`;
    });
}

async function addBook() {
    await apiFetch('/add-book', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            title: title.value,
            author: author.value,
            genre: genre.value,
            priority: priority.value,
            status: status.value
        })
    });

    loadBooks();
}

async function removeBook(id) {
    await apiFetch('/remove-book/' + id, { method: 'DELETE' });
    loadBooks();
}

async function searchBooks() {
    const q = searchBox.value;
    const res = await fetch('/search?query=' + q);
    const data = await res.json();

    results.innerHTML = data.map(b => `<div>${b.title}</div>`).join("");
}

function filterBooks(type) {
    if (type === "all") return renderBooks(allBooks);
    renderBooks(allBooks.filter(b => b.status === type));
}

loadBooks();

</script>

</body>
</html>
